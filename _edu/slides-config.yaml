# Sistema de diseño para la exportación de filminas (Google Slides)
# Generado por /edu_slides_designer

# --- Template Google Slides ---
template_id: "1I1_kg3SgqTzT5y2hWvPqqfjPCuR29vKLmCGMLCsDkbg"

# --- Directorio Drive para assets (imágenes, tablas) ---
# Usar el ID de la carpeta de Drive donde está el template.
# Para obtenerlo: abrir la carpeta en Drive → la URL termina en /folders/{ID}
drive_parent_folder_id: "1AmkD1QZCPCD1Dqym1IAcaeeboU6y0rrc"

# --- Paleta de colores ---
# Paleta institucional PJN extraída de https://www.pjn.gov.ar/
palette:
  primary: "#0072bb"       # Azul institucional PJN — títulos y encabezados de tabla
  secondary: "#FFFFFF"     # Blanco — texto sobre fondos oscuros / portadas
  accent: "#2897D4"        # Azul claro PJN — énfasis inline y variantes hover
  background: "#FFFFFF"   # Fondo de filmina
  text: "#333333"          # Gris oscuro — texto principal (legible, no duro)

# --- Tipografía (Google Fonts recomendadas) ---
# Criterio: sala presencial 6m / pantalla 1080p → mín 36pt título, mín 20pt cuerpo
typography:
  title:
    font: "Roboto"
    size: 36              # era 30 — mínimo recomendado para aula 6m
    weight: "bold"
  subtitle:
    font: "Roboto"
    size: 22              # era 28 — subtítulo debe ser menor que el título
    weight: "regular"
  body:
    font: "Roboto"
    size: 20              # era 16 — crítico para legibilidad a 6m
    weight: "regular"
  code:
    font: "Roboto Mono"
    size: 14              # era 18 — monospace más compacto = más contenido visible
    weight: "regular"

# --- Layouts por tipo de filmina ---
# Cada layout define cómo se estructura el contenido para ese tipo de slide.
layouts:
  portada:
    title:
      font: title
      align: center
      color: primary
    subtitle:
      font: subtitle
      align: center
      color: secondary
    logo_position: bottom-right

  "concepto-abstracto":
    title:
      font: title
      align: left
      color: primary
    body:
      font: body
      align: left
      color: text
    image:
      position: right
      size: medium

  codigo:
    title:
      font: title
      align: left
      color: primary
    code_block:
      font: code
      background: "#F4F4F4"
      border: true

  "tabla-comparativa":
    title:
      font: title
      align: left
      color: primary
    table:
      header_color: secondary
      row_even: "#F9F9F9"
      row_odd: "#FFFFFF"

  "pregunta-socrática":
    title:
      font: title
      align: center
      color: primary
    body:
      font: body
      align: center
      color: text

  timeline:
    title:
      font: title
      align: left
      color: primary
    body:
      font: body
      align: left
      color: text

  cierre:
    title:
      font: title
      align: center
      color: primary
    body:
      font: body
      align: center
      color: text

  "demo-herramienta":
    title:
      font: title
      align: left
      color: primary
    steps:
      font: body
      align: left
      color: text

# --- Tipos de filmina — Tabla canónica inmutable ---
# Esta tabla es la ÚNICA fuente de verdad para tipos, layouts e imagen.
# El script solo lee de aquí. Los agentes asignan tipos explícitos desde esta tabla.
slide_types:
  portada:
    layout: {title: center-middle, body: center-bottom, image: background, code: none, table: none}
    image_layer: background
  concepto-abstracto:
    layout: {title: full-title, body: left-middle, image: right-half, code: none, table: none}
    image_layer: content
  concepto-mixto:
    layout: {title: full-title, body: left-middle, image: none, code: right-half, table: none}
    image_layer: none
    note: "Texto izquierda + código derecha. Añadido v2 post-Bug 1."
  tabla-mixta:
    layout: {title: full-title, body: left-top-split, image: none, code: left-bottom-split, table: right-half}
    image_layer: none
    note: "Texto/código a la izquierda y tabla a la derecha. Añadido para evitar pérdida de tablas en slides mixtas."
  codigo:
    layout: {title: full-title, body: subtitle-only, image: none, code: full-bottom, table: none}
    image_layer: none
  tabla:
    layout: {title: full-title, body: table-intro, image: none, code: none, table: table-main}
    image_layer: none
  tabla-comparativa:
    layout: {title: full-title, body: table-intro, image: none, code: none, table: table-main}
    image_layer: none
  diagrama:
    layout: {title: full-title, body: left-middle, image: right-half, code: none, table: none}
    image_layer: content
  socratica:
    layout: {title: center-top, body: center-middle, image: background, code: none, table: none}
    image_layer: background
  cierre:
    layout: {title: center-middle, body: center-bottom, image: background, code: none, table: none}
    image_layer: background
  timeline:
    layout: {title: full-title, body: full-center, image: none, code: none, table: none}
    image_layer: none
  demo:
    layout: {title: full-title, body: left-middle, image: none, code: right-half, table: none}
    image_layer: none

# --- Estrategia de imágenes (Gemini) ---
gemini_image_strategy:
  default: "content"
  max_per_presentation: 12
  max_images_per_presentation: 12  # alias de compatibilidad
  # Nota: para presentaciones >30 slides (ej: 46 slides), escalar con el Arquitecto
  # el campo "maximum": 12 en plan-filminas.schema.json (bump a v4).
  fallback: "none"
  safety_rules: "Sin texto, sin letras, sin código, sin etiquetas ni fórmulas. Solo elementos visuales: objetos, iconos, escenas o diagramas mudos. Estilo vectorial limpio, fondo claro, académico."
  prompt_guide: |
    REGLA: describir SOLO geometría (formas, colores, posiciones, tamaños).
    NUNCA nombrar conceptos técnicos — Gemini los convierte en etiquetas de texto.
    Template: [Elemento]: [forma] [color] [posición]. [Relación posicional]. [Estilo flat]. Sin texto, sin letras.

# --- Render semántico de Markdown en Google Slides ---
markdown_rendering:
  unordered_bullet_preset: "BULLET_DISC_CIRCLE_SQUARE"
  ordered_bullet_preset: "NUMBERED_DIGIT_ALPHA_ROMAN"
  inline_code_font: "Roboto Mono"
  inline_code_color: "#0072bb"   # coincide con primary (azul PJN) para coherencia visual
  lead_scale: 1.0
  heading_scale: 1.15            # era 1.12 — headings ligeramente más prominentes
