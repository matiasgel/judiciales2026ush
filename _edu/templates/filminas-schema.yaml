version: "filminas/v3"
description: "Contrato de autoría de filminas.md — directivas y estructura del archivo fuente Markdown"
changelog: "v3 (2026-03-25): alinea con JSON schemas en _edu/schemas/; el plan y validación se definen allá"
template_path: "_edu/templates/filminas-template.md"
schema_registry: "_edu/schemas/schema-registry.json"

markers:
  slide_heading_pattern: "^###\\s+\\[F-(\\d+)\\]\\s*(.*)$"
  ignored_section_patterns:
    - "^##\\s+PORTADA\\b"
    - "^##\\s+BLOQUE\\b"
  separator: "---"

headings:
  subtitle_levels: [1]
  body_heading_levels: [2, 3, 4, 5, 6]

directives:
  type: "@tipo:"
  layout: "@layout:"
  image: "@imagen:"
  image_prompt: "@prompt-imagen:"
  asset: "@asset:"

allowed:
  slide_types:
    - portada
    - concepto-abstracto
    - concepto-mixto      # texto + código en columnas (v2)
    - codigo
    - tabla
    - tabla-comparativa
    - tabla-mixta          # texto/código izquierda + tabla derecha (v2)
    - diagrama
    - socratica
    - demo
    - cierre
    - timeline
  layout_presets:
    - portada
    - concepto-abstracto
    - concepto-mixto
    - codigo
    - tabla
    - tabla-comparativa
    - tabla-mixta
    - diagrama
    - socratica
    - demo
    - cierre
    - timeline
  image_layers:
    - background
    - content
    - none

contract:
  slide_start: "Cada slide comienza con ### [F-XX] Titulo"
  subtitle: "El primer # interno de la slide define el subtitulo"
  body_headings: "Los headings ## a ###### dentro de la slide se preservan como encabezados del cuerpo"
  body_text: "Parrafos normales son texto corrido"
  bullet_lists: "Usar Markdown estandar con -, * o listas numeradas"
  code_blocks: "Usar fences ```lenguaje"
  tables: "Usar tablas Markdown cuando la comparacion sea tabular"
  directives: "Las directivas @tipo, @layout, @imagen y @asset permiten eliminar ambiguedad"
  image_prompt: "Toda slide con @imagen: background|content debe incluir @prompt-imagen o un @asset con prompt=..."

examples:
  minimal_slide:
    - "### [F-01] Titulo corto"
    - "# Subtitulo visible"
    - "- Punto 1"
    - "- Punto 2"
  diagram_slide:
    - "### [F-08] Cuello de botella"
    - "@tipo: diagrama"
    - "@imagen: content"
    - "@prompt-imagen: diagrama del cuello de botella CPU-memoria con flujo secuencial y puntos de contención"
    - "@asset: kind=diagram position=right-half prompt=\"Bus CPU memoria\""
    - "# La ejecucion secuencial es una restriccion"
    - "- Consecuencia 1"
    - "- Consecuencia 2"

validation:
  image_prompt_required_when_image_enabled: true
  accepted_image_prompt_sources:
    - directive:image_prompt
    - asset:prompt
  image_prompt_rules:
    - "REGLA FUNDAMENTAL (anti-Bug 3): describir SOLO geometría visual — formas, colores, posiciones."
    - "NUNCA nombrar conceptos técnicos en el prompt — Gemini los convierte en etiquetas de texto en inglés."
    - "SIEMPRE terminar el prompt con: Sin texto, sin letras, sin etiquetas, sin código, sin números."
    - "Ejemplo CORRECTO: Three flat icons in a horizontal sequence on white background. First: blob shape bordo. Second: branching tree dark gray. Third: checkmark symbol. No text whatsoever."
    - "Ejemplo INCORRECTO: 'diagrama con fases del compilador: lexer, parser, semántica' → Gemini generará etiquetas."
    - "Ver guía completa en: _edu/templates/prompt-imagen-guide.md"
  coherence_rules:
    - "Los ejemplos, términos y secuencia conceptual deben poder reutilizarse en minuta.md sin contradicciones"
    - "Si una filmina introduce una imagen, el prompt debe reforzar la idea central de esa misma filmina"